name: Deploy FastAPI App

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master

jobs:
  sonarqube:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          # Disabling shallow clones is recommended for improving the relevancy of reporting
          fetch-depth: 0

      - name: SonarQube Scan
        uses: sonarsource/sonarqube-scan-action@v2.1.0
        with:
          projectBaseDir: .
          args: >
            -Dsonar.projectKey=hive-box
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}

  build:
    runs-on: ubuntu-latest
    needs: sonarqube
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: 3.9

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          
      - name: Lint Python code
        run: |
          pip install flake8
          flake8 --max-line-length=100 backend/
          
      - name: Lint Dockerfile with Hadolint
        uses: hadolint/hadolint-action@v1.5.0
        with:
          dockerfile: backend/Dockerfile

      - name: Run unit tests
        run: |
          pytest backend/

      - name: Log in to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Set build info
        id: set_build_info
        run: echo "BUILD_INFO=$(date +%Y%m%d%H%M%S)" >> $GITHUB_ENV

      - name: Debug build info
        run: echo "BUILD_INFO is $BUILD_INFO"

      - name: Build Docker image
        run: docker build -t ${{ secrets.DOCKER_USERNAME }}/backend-hivebox:${{ env.BUILD_INFO }} .

      - name: Push Docker image
        run: docker push ${{ secrets.DOCKER_USERNAME }}/backend-hivebox:${{ env.BUILD_INFO }}

      - name: Run Scorecard analysis
        uses: ossf/scorecard-action@v2.3.3
        with:
          clean: true
          results_file: results.sarif

