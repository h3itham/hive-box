<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Temperature App</title>
  <style>
    body {
      font-family: 'Roboto', Arial, sans-serif;
      background: linear-gradient(to bottom, #74ebd5, #9face6);
      color: #333;
      text-align: center;
      margin: 0;
      padding: 0;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }

    h1 {
      font-size: 3rem;
      color: #2c3e50;
      margin-bottom: 20px;
    }

    button {
      background-color: #3498db;
      color: white;
      border: none;
      padding: 10px 20px;
      font-size: 1.2rem;
      border-radius: 5px;
      cursor: pointer;
      transition: background-color 0.3s ease;
    }

    button:hover {
      background-color: #2980b9;
    }

    .status {
      font-size: 1.5rem;
      font-weight: bold;
      margin-top: 20px;
      padding: 10px;
      border-radius: 5px;
      display: inline-block;
    }

    #averageTemperature {
      font-size: 1.2rem;
      margin: 15px 0;
    }

    .success {
      background-color: #2ecc71;
      color: white;
    }

    .warning {
      background-color: #f1c40f;
      color: black;
    }

    .error {
      background-color: #e74c3c;
      color: white;
    }
  </style>
</head>
<body>
  <h1>Temperature Status</h1>
  <div>
    <button id="fetchTempBtn">Fetch Temperature</button>
  </div>
  <p id="averageTemperature">Average Temperature: --</p>
  <p id="status" class="status">Status: --</p>

  <script src="app.js"></script>
</body>
</html>
